# GitLab CI — disabled (CI moved to GitHub Actions)
#
# R48: GitLab CI minutes are limited (400/month for free tier, even for public
# projects). GitHub Actions offers unlimited minutes for public repos. The
# actual CI (typecheck, build, test) now runs on GitHub Actions via the
# .github/workflows/ci.yml workflow. Code is automatically mirrored from
# GitLab to GitHub via the project's push mirror setting (Settings → Repository
# → Mirroring repositories).
#
# This file is kept so GitLab doesn't show a "missing CI config" warning.
# The job below is a no-op that completes instantly (0 minutes consumed).

ci-moved-to-github:
  stage: test
  image: alpine:latest
  script:
    - echo "CI runs on GitHub Actions — see .github/workflows/ci.yml"
    - echo "Mirror: https://github.com/Cheurteenyt/codebase-mirror"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

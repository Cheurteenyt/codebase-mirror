# GitLab CI — lightweight mirror to GitHub (CI runs on GitHub Actions)
#
# R48: GitLab CI minutes are limited (400/month for free tier, even for public
# projects). GitHub Actions offers unlimited minutes for public repos. The
# actual CI (typecheck, build, test) runs on GitHub Actions via
# .github/workflows/ci.yml. This pipeline only mirrors the code to GitHub so
# the Actions workflow triggers automatically.
#
# Setup: add a CI/CD variable named GITHUB_MIRROR_TOKEN in
# Settings → CI/CD → Variables with the GitHub PAT value.
#
# Cost: ~5-10 seconds per pipeline (git push only, no npm install).

stages:
  - mirror

mirror-to-github:
  stage: mirror
  image: alpine:latest
  before_script:
    - apk add --no-cache git
  script:
    - echo "Mirroring to GitHub to trigger Actions CI..."
    - git push "https://Cheurteenyt:${GITHUB_MIRROR_TOKEN}@github.com/Cheurteenyt/codebase-mirror.git" HEAD:main --force
    - echo "Mirror complete. CI runs at https://github.com/Cheurteenyt/codebase-mirror/actions"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
  variables:
    # Don't clone submodules or LFS — just the bare repo for pushing.
    GIT_STRATEGY: "clone"
    GIT_DEPTH: "0"

name: Mirror validated GitHub main to GitLab

# R166: initial passive mirror workflow.
# R167: monolithic step split into named steps + fingerprint checks.
# R168: state machine extracted to scripts/ci/mirror-main-to-gitlab.sh.
# R168.1: GitHub reads fail-closed, trap outputs, test-only hooks.
# SIG-R169 Phase B: Cross-host signature trust gate ACTIVATED.
#
# The verifier and mirror runtime are loaded from an audited immutable SHA:
#   TRUSTED_VERIFIER_SHA = 15a732d91984e5b4ffa29b4e129ac0d6316c9fca
#
# This breaks the circular trust root: TARGET_SHA cannot supply its own
# verifier because the verifier comes from a different, pinned commit.
#
# Step ordering (SIG-R169-Phase-B-FINAL):
#   1. Validate event identity
#   2. Checkout pinned verifier + mirror runtime
#   3. Verify signature (fail-closed JSON wrapper)
#   4. Checkout TARGET_SHA (only if gate passed)
#   5. Revalidate dispatched main immediately before credentials
#   6. Materialize SSH key (only if gate passed)
#   7. Run the pinned mirror state machine from the trusted checkout
#   8. Cleanup (always, id: cleanup)
#   9. Final verdict + summary (always, LAST step, exits 1 on FAILED)
#
# The cleanup runs BEFORE the final verdict so the verdict can require
# steps.cleanup.outcome == success. The final verdict is the LAST step
# and exits 1 on FAILED — the job goes red if the effective state is
# FAILED, not just if an earlier step failed.
#
# Three verdicts (SIG-R169-Phase-B-CONC):
#   SUCCESS:   mirrored|already-mirrored + observed_sha==TARGET_SHA + sig valid + cleanup ok
#   SUPERSEDED: newer-valid-mirror-present + post_verify==success + observed_sha non-empty
#               + github_main_sha non-empty + sig valid + cleanup ok
#   FAILED:    everything else (exit 1)
#
# Required environment (GitHub Environment "gitlab-passive-mirror"):
#   Secret:    GITLAB_MIRROR_SSH_PRIVATE_KEY  (OpenSSH ed25519, no passphrase)
#   Variable:  GITLAB_REPOSITORY_SSH_URL      (git@gitlab.com:cheurteen1/codebase-memory-V2.git)
#   Variable:  GITLAB_KNOWN_HOSTS             (pinned GitLab.com host keys, full file content)
#   Variable:  GITLAB_MIRROR_KEY_FINGERPRINT  (SHA256:p45GIFj/WYp6QAab9FgwbC0cgGv4EHPj94I8PKQBO5M)
#   Variable:  GITLAB_ED25519_HOST_FINGERPRINT (SHA256:eUXGGm1YGsMAS7vkcx6JOJdOGHPem5gQp4taiCfCLB8)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  actions: read
  contents: read

concurrency:
  group: gitlab-passive-main-mirror
  cancel-in-progress: false

# SIG-R169 Phase B: The pinned immutable audited-runtime squash SHA.
# This is the ONLY source of trust for the verifier. Never use main, HEAD,
# TARGET_SHA, github.sha, or any moving ref/branch/tag.
# To rotate: publish a runtime update PR, squash-merge, verify CI + mirror,
# then update this SHA in a separate PR.
env:
  TRUSTED_VERIFIER_SHA: 15a732d91984e5b4ffa29b4e129ac0d6316c9fca

jobs:
  mirror:
    name: Mirror validated main
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.event == 'push' ||
       github.event.workflow_run.event == 'workflow_dispatch') &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository

    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: gitlab-passive-mirror

    env:
      TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
      GITLAB_URL: ${{ vars.GITLAB_REPOSITORY_SSH_URL }}
      EXPECTED_KEY_FP: ${{ vars.GITLAB_MIRROR_KEY_FINGERPRINT }}
      EXPECTED_HOST_FP: ${{ vars.GITLAB_ED25519_HOST_FINGERPRINT }}

    steps:
      # ── Step 1: Validate workflow_run event identity ────────────────
      - name: Validate event identity
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_API_URL: ${{ github.api_url }}
          GH_REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_EVENT: ${{ github.event.workflow_run.event }}
          RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_HEAD_REPOSITORY: ${{ github.event.workflow_run.head_repository.full_name }}
          RUN_WORKFLOW_ID: ${{ github.event.workflow_run.workflow_id }}
        run: |
          set -euo pipefail

          if ! [[ "$TARGET_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Invalid workflow_run head SHA: $TARGET_SHA"
            exit 1
          fi

          if [ -z "$GITLAB_URL" ]; then
            echo "::error::GITLAB_REPOSITORY_SSH_URL is empty."
            exit 1
          fi

          EXPECTED_GITLAB_URL="git@gitlab.com:cheurteen1/codebase-memory-V2.git"
          if [ "$GITLAB_URL" != "$EXPECTED_GITLAB_URL" ]; then
            echo "::error::Unexpected GitLab mirror URL."
            echo "::error::Expected exactly: $EXPECTED_GITLAB_URL"
            exit 1
          fi

          if [ -z "$EXPECTED_KEY_FP" ]; then
            echo "::error::GITLAB_MIRROR_KEY_FINGERPRINT is empty."
            exit 1
          fi

          if [ -z "$EXPECTED_HOST_FP" ]; then
            echo "::error::GITLAB_ED25519_HOST_FINGERPRINT is empty."
            exit 1
          fi

          # Verify TRUSTED_VERIFIER_SHA is a 40-char hex SHA
          if ! [[ "$TRUSTED_VERIFIER_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::TRUSTED_VERIFIER_SHA is not a valid 40-char hex SHA: $TRUSTED_VERIFIER_SHA"
            exit 1
          fi

          # Re-read both the triggering run and the canonical workflow from
          # GitHub. For workflow_dispatch, successful completion of the
          # exact-SHA preflight plus live main parity is mandatory.
          python3 - <<'PY'
          import json
          import os
          import re
          import sys
          import urllib.error
          import urllib.request

          API_VERSION = "2026-03-10"
          EXPECTED_REPOSITORY = "Cheurteenyt/codebase-mirror"
          EXPECTED_WORKFLOW_NAME = "CI"
          EXPECTED_WORKFLOW_PATH = ".github/workflows/ci.yml"
          EXPECTED_PREFLIGHT_NAME = "Exact main SHA preflight"
          SHA_PATTERN = re.compile(r"[0-9a-f]{40}")

          token = os.environ["GH_TOKEN"]
          api_url = os.environ["GH_API_URL"].rstrip("/")
          repository = os.environ["GH_REPOSITORY"]
          run_id = os.environ["RUN_ID"]
          event = os.environ["RUN_EVENT"]
          conclusion = os.environ["RUN_CONCLUSION"]
          branch = os.environ["RUN_HEAD_BRANCH"]
          target_sha = os.environ["TARGET_SHA"]
          payload_sha = os.environ["RUN_HEAD_SHA"]
          head_repository = os.environ["RUN_HEAD_REPOSITORY"]
          workflow_id = os.environ["RUN_WORKFLOW_ID"]

          def fail(message):
              print(f"::error::{message}", file=sys.stderr)
              raise SystemExit(1)

          def request(path):
              req = urllib.request.Request(
                  f"{api_url}{path}",
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": API_VERSION,
                      "User-Agent": "codebase-mirror-exact-ci-mirror",
                  },
              )
              try:
                  with urllib.request.urlopen(req, timeout=30) as response:
                      return json.load(response)
              except urllib.error.HTTPError as exc:
                  detail = exc.read().decode("utf-8", "replace")[:1000]
                  fail(f"GitHub API GET {path} failed ({exc.code}): {detail}")
              except (urllib.error.URLError, TimeoutError, json.JSONDecodeError) as exc:
                  fail(f"GitHub API GET {path} failed: {exc}")

          if repository != EXPECTED_REPOSITORY or head_repository != repository:
              fail("The mirror is bound to same-repository codebase-mirror runs.")
          if event not in {"push", "workflow_dispatch"}:
              fail(f"Unsupported canonical CI event: {event}")
          if conclusion != "success" or branch != "main":
              fail("The canonical CI run must be a successful main run.")
          if not SHA_PATTERN.fullmatch(target_sha) or payload_sha != target_sha:
              fail("The workflow_run payload is not bound to one exact target SHA.")
          if not run_id.isdecimal() or not workflow_id.isdecimal():
              fail("The workflow_run identifiers are malformed.")

          run = request(f"/repos/{repository}/actions/runs/{run_id}")
          canonical_ci = request(
              f"/repos/{repository}/actions/workflows/ci.yml"
          )
          run_path = str(run.get("path") or "").split("@", 1)[0]
          run_head_repository = run.get("head_repository") or {}
          run_repository = run.get("repository") or {}
          checks = {
              "run_id": str(run.get("id")) == run_id,
              "workflow_id": (
                  str(run.get("workflow_id")) == workflow_id
                  and run.get("workflow_id") == canonical_ci.get("id")
              ),
              "workflow_name": canonical_ci.get("name") == EXPECTED_WORKFLOW_NAME,
              "workflow_path": (
                  canonical_ci.get("path") == EXPECTED_WORKFLOW_PATH
                  and run_path == EXPECTED_WORKFLOW_PATH
              ),
              "workflow_active": canonical_ci.get("state") == "active",
              "event": run.get("event") == event,
              "status": run.get("status") == "completed",
              "conclusion": run.get("conclusion") == "success",
              "branch": run.get("head_branch") == "main",
              "sha": run.get("head_sha") == target_sha,
              "repository": run_repository.get("full_name") == repository,
              "head_repository": run_head_repository.get("full_name") == repository,
          }
          failures = [name for name, passed in checks.items() if not passed]
          if failures:
              fail("Canonical CI workflow identity mismatch: " + ", ".join(failures))

          if event == "workflow_dispatch":
              jobs = request(
                  f"/repos/{repository}/actions/runs/{run_id}/jobs"
                  "?filter=latest&per_page=100"
              )
              job_list = jobs.get("jobs") or []
              if jobs.get("total_count") != len(job_list) or len(job_list) > 100:
                  fail("The dispatched CI job list is incomplete or inconsistent.")
              exact_preflights = [
                  job for job in job_list
                  if job.get("name") == EXPECTED_PREFLIGHT_NAME
              ]
              if len(exact_preflights) != 1:
                  fail("The dispatched CI run lacks one canonical exact-SHA preflight.")
              preflight = exact_preflights[0]
              if (
                  preflight.get("status") != "completed"
                  or preflight.get("conclusion") != "success"
                  or preflight.get("head_sha") != target_sha
              ):
                  fail("The dispatched CI exact-SHA preflight did not validate target SHA.")

              main_ref = request(
                  f"/repos/{repository}/git/ref/heads/main"
              )
              main_object = main_ref.get("object") or {}
              if (
                  main_ref.get("ref") != "refs/heads/main"
                  or main_object.get("type") != "commit"
                  or main_object.get("sha") != target_sha
              ):
                  fail("Dispatched CI target is no longer the exact live main ref.")

          print(
              f"Canonical {event} CI run {run_id} verified for exact SHA {target_sha}."
          )
          PY

      # ── Step 2: Checkout trusted signature verifier (PINNED SHA) ────
      # SIG-R169 Phase B: Load the verifier and runtime from the immutable
      # audited squash SHA. NOT from main, HEAD, TARGET_SHA, or github.sha.
      - name: Checkout trusted signature verifier
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: 15a732d91984e5b4ffa29b4e129ac0d6316c9fca
          fetch-depth: 1
          sparse-checkout: |
            scripts/ci
          path: trusted-verifier
          persist-credentials: false

      # ── Step 3: Verify GitHub commit signature (SIG-R169 gate) ──────
      # Calls the pinned verifier script. The script verifies TARGET_SHA
      # via the GitHub REST API and writes JSON outputs to OUTPUT_FILE.
      # This step runs BEFORE TARGET_SHA checkout and BEFORE any GitLab
      # SSH key materialization.
      - name: Verify GitHub commit signature
        id: github_signature
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OUTPUT_FILE: ${{ runner.temp }}/github-signature-outputs.json
        run: |
          set -uo pipefail

          # Run the pinned canonical verifier (SIG-R169-DIV-01)
          bash trusted-verifier/scripts/ci/verify-github-commit-signature.sh || SCRIPT_EXIT=$?
          SCRIPT_EXIT=${SCRIPT_EXIT:-0}

          # SIG-R3-OUTPUT-01 / SIG-R169-Phase-B: Fail-closed JSON validation.
          # The wrapper MUST reject:
          #   - JSON absent or empty
          #   - JSON malformed
          #   - Missing or extra keys
          #   - Multiline values
          #   - exit 0 inconsistent with outputs (verified=true, reason=valid,
          #     api_sha=TARGET_SHA, error_category=none)
          #   - attempts out of valid range
          # If any check fails, the step exits 1 — no GitLab key materialized.

          if [ ! -s "$OUTPUT_FILE" ]; then
            echo "::error::Signature verifier produced no output JSON (exit=$SCRIPT_EXIT)"
            echo "verified=error" >> "$GITHUB_OUTPUT"
            echo "error_category=GITHUB_SIGNATURE_WRAPPER_ERROR" >> "$GITHUB_OUTPUT"
            echo "attempts=0" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if ! STEP_OUTPUTS="$(
            SCRIPT_EXIT="$SCRIPT_EXIT" \
            TARGET_SHA="$TARGET_SHA" \
            OUTPUT_FILE="$OUTPUT_FILE" \
            python3 -c '
          import json
          import os
          import sys

          path = os.environ["OUTPUT_FILE"]
          target = os.environ["TARGET_SHA"]
          script_exit = os.environ["SCRIPT_EXIT"]

          try:
              with open(path, encoding="utf-8") as f:
                  d = json.load(f)
          except Exception:
              print("WRAPPER_ERROR|malformed_json")
              sys.exit(0)

          # Exact key set — no missing, no extra
          required = {
              "verified",
              "reason",
              "verified_at",
              "api_sha",
              "error_category",
              "attempts",
          }
          if set(d.keys()) != required:
              print("WRAPPER_ERROR|invalid_keys")
              sys.exit(0)

          # Reject multiline values
          for key, value in d.items():
              if "\n" in str(value) or "\r" in str(value):
                  print("WRAPPER_ERROR|multiline_value")
                  sys.exit(0)

          # SIG-R169-Phase-B-WRAPPER-03: Strict attempts validation.
          #   - attempts must be a string (not bool, float, or other type)
          #   - must match regex ^[0-3]$ (single digit 0-3)
          #   - success (script_exit == 0): attempts must be 1-3
          #   - diagnostic/config (script_exit != 0): attempts must be 0-3
          import re as _re
          if not isinstance(d["attempts"], str):
              print("WRAPPER_ERROR|attempts_not_string")
              sys.exit(0)
          if not _re.match(r"^[0-3]$", d["attempts"]):
              print("WRAPPER_ERROR|attempts_not_canonical")
              sys.exit(0)
          attempts_int = int(d["attempts"])
          if script_exit == "0" and attempts_int < 1:
              print("WRAPPER_ERROR|attempts_success_too_low")
              sys.exit(0)

          # If script exit 0, outputs must be consistent with success
          if script_exit == "0":
              if not (
                  d["verified"] == "true"
                  and d["reason"] == "valid"
                  and d["verified_at"]
                  and d["api_sha"] == target
                  and d["error_category"] == "none"
              ):
                  print("WRAPPER_ERROR|exit0_inconsistent")
                  sys.exit(0)

          # If script exit != 0, verified must not be "true"
          if script_exit != "0" and d["verified"] == "true":
              print("WRAPPER_ERROR|exit_nonzero_but_verified_true")
              sys.exit(0)

          # All checks passed — emit key=value pairs for GITHUB_OUTPUT
          for key, value in d.items():
              print(f"{key}={value}")
          '
          )"; then
            echo "::error::Wrapper JSON validation failed"
            echo "verified=error" >> "$GITHUB_OUTPUT"
            echo "error_category=GITHUB_SIGNATURE_WRAPPER_ERROR" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          # Check for wrapper errors
          if echo "$STEP_OUTPUTS" | grep -q "^WRAPPER_ERROR|"; then
            ERROR_DETAIL=$(echo "$STEP_OUTPUTS" | grep "^WRAPPER_ERROR|" | cut -d'|' -f2)
            echo "::error::Signature wrapper validation failed: $ERROR_DETAIL"
            echo "verified=error" >> "$GITHUB_OUTPUT"
            echo "error_category=GITHUB_SIGNATURE_WRAPPER_ERROR" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          # Publish validated outputs to GITHUB_OUTPUT
          printf '%s\n' "$STEP_OUTPUTS" >> "$GITHUB_OUTPUT"

          # If the script itself failed, exit now (diagnostics already published)
          if [ "$SCRIPT_EXIT" != "0" ]; then
            exit "$SCRIPT_EXIT"
          fi

      # ── Step 4: Checkout exact CI-validated SHA ──────────────────────
      # Only reached if signature verification PASSED.
      - name: Checkout exact CI-validated SHA
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0
          persist-credentials: false
          path: target

      # ── Step 5: Revalidate dispatched main before credentials ────────
      # Signature verification can retry. Close that time-of-check window
      # before any GitLab secret is materialized, and fail if main moved.
      - name: Revalidate dispatched main before credentials
        id: dispatch_main_revalidation
        if: github.event.workflow_run.event == 'workflow_dispatch'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_API_URL: ${{ github.api_url }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          API_VERSION = "2026-03-10"
          repository = os.environ["GH_REPOSITORY"]
          target_sha = os.environ["TARGET_SHA"]
          request = urllib.request.Request(
              f"{os.environ['GH_API_URL'].rstrip('/')}/repos/{repository}/git/ref/heads/main",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "X-GitHub-Api-Version": API_VERSION,
                  "User-Agent": "codebase-mirror-pre-credential-main-check",
              },
          )

          def fail(message):
              print(f"::error::{message}", file=sys.stderr)
              raise SystemExit(1)

          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  main_ref = json.load(response)
          except urllib.error.HTTPError as exc:
              detail = exc.read().decode("utf-8", "replace")[:1000]
              fail(f"GitHub main-ref API failed ({exc.code}): {detail}")
          except (urllib.error.URLError, TimeoutError, json.JSONDecodeError) as exc:
              fail(f"GitHub main-ref API failed: {exc}")

          main_object = main_ref.get("object") or {}
          if (
              main_ref.get("ref") != "refs/heads/main"
              or main_object.get("type") != "commit"
              or main_object.get("sha") != target_sha
          ):
              fail("Live main moved away from the dispatched exact target SHA.")
          print(f"Dispatched main remains exact before credentials: {target_sha}")
          PY

      # ── Step 6: Materialize SSH key + known_hosts ────────────────────
      - name: Materialize SSH key and known_hosts
        id: materialize
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GITLAB_MIRROR_SSH_PRIVATE_KEY }}
          KNOWN_HOSTS: ${{ vars.GITLAB_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::GITLAB_MIRROR_SSH_PRIVATE_KEY secret is empty."
            exit 1
          fi
          if [ -z "$KNOWN_HOSTS" ]; then
            echo "::error::GITLAB_KNOWN_HOSTS variable is empty."
            exit 1
          fi

          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/gitlab_mirror_ed25519"
          chmod 600 "$HOME/.ssh/gitlab_mirror_ed25519"
          printf '%s\n' "$KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"

          echo "ssh_key_file=$HOME/.ssh/gitlab_mirror_ed25519" >> "$GITHUB_OUTPUT"
          echo "known_hosts_file=$HOME/.ssh/known_hosts" >> "$GITHUB_OUTPUT"

      # ── Step 7: Run PINNED mirror state machine ──────────────────────
      # The target checkout is only Git data. No script supplied by
      # TARGET_SHA is executed with the GitLab credential available.
      - name: Run pinned mirror state machine
        id: mirror
        shell: bash
        working-directory: target
        env:
          SSH_KEY_FILE: ${{ steps.materialize.outputs.ssh_key_file }}
          KNOWN_HOSTS_FILE: ${{ steps.materialize.outputs.known_hosts_file }}
          GITHUB_REMOTE: origin
          OUTPUT_FILE: ${{ runner.temp }}/mirror-outputs.txt
        run: |
          set -euo pipefail
          bash "$GITHUB_WORKSPACE/trusted-verifier/scripts/ci/mirror-main-to-gitlab.sh" || SCRIPT_EXIT=$?
          SCRIPT_EXIT=${SCRIPT_EXIT:-0}

          if [ -f "$OUTPUT_FILE" ]; then
            while IFS='=' read -r key value; do
              echo "$key=$value" >> "$GITHUB_OUTPUT"
            done < "$OUTPUT_FILE"
          fi

          if [ "$SCRIPT_EXIT" != "0" ]; then
            exit "$SCRIPT_EXIT"
          fi

      # ── Step 8: Cleanup (always, BEFORE final verdict) ───────────────
      # SIG-R169-Phase-B-CLEANUP: Cleanup runs BEFORE the final verdict
      # so the verdict can require steps.cleanup.outcome == success.
      # The final verdict is the LAST step and exits 1 on FAILED.
      - name: Cleanup SSH material and temp files
        id: cleanup
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            "$HOME/.ssh/gitlab_mirror_ed25519" \
            "$HOME/.ssh/config" \
            "$HOME/.ssh/known_hosts" \
            "${RUNNER_TEMP:-/tmp}/mirror-outputs.txt" \
            "${RUNNER_TEMP:-/tmp}/github-signature-outputs.json"

      # ── Step 9: Final verdict + summary (always, LAST step) ──────────
      # SIG-R169-Phase-B-FINAL: This step computes the effective verdict
      # and EXITS 1 on FAILED. The job goes red if the effective state
      # is FAILED, not just if an earlier step failed.
      #
      # Three verdicts (SIG-R169-Phase-B-CONC):
      #   SUCCESS:    mirrored|already-mirrored + observed_sha==TARGET_SHA
      #               + sig valid + cleanup success
      #   SUPERSEDED: newer-valid-mirror-present + post_verify==success
      #               + observed_sha non-empty + github_main_sha non-empty
      #               + sig valid + cleanup success
      #   FAILED:     everything else (exit 1)
      - name: Final verdict and summary
        id: final_verdict
        if: always()
        shell: bash
        env:
          # Signature gate outputs
          SIG_VERIFIED: ${{ steps.github_signature.outputs.verified }}
          SIG_REASON: ${{ steps.github_signature.outputs.reason }}
          SIG_VERIFIED_AT: ${{ steps.github_signature.outputs.verified_at }}
          SIG_API_SHA: ${{ steps.github_signature.outputs.api_sha }}
          SIG_ERROR_CATEGORY: ${{ steps.github_signature.outputs.error_category }}
          SIG_ATTEMPTS: ${{ steps.github_signature.outputs.attempts }}
          # Mirror outputs
          FINAL_RESULT: ${{ steps.mirror.outputs.final_result }}
          OBSERVED_SHA: ${{ steps.mirror.outputs.observed_sha }}
          GITHUB_MAIN_SHA: ${{ steps.mirror.outputs.github_main_sha }}
          ERROR_CATEGORY: ${{ steps.mirror.outputs.error_category }}
          ERROR_PHASE: ${{ steps.mirror.outputs.error_phase }}
          CLIENT_FP_VERIFIED: ${{ steps.mirror.outputs.client_fp_verified }}
          CLIENT_FP_ACTUAL: ${{ steps.mirror.outputs.client_fp_actual }}
          HOST_FP_VERIFIED: ${{ steps.mirror.outputs.host_fp_verified }}
          HOST_FP_ACTUAL: ${{ steps.mirror.outputs.host_fp_actual }}
          PUSH_ATTEMPTED: ${{ steps.mirror.outputs.push_attempted }}
          PUSH_COMPLETED: ${{ steps.mirror.outputs.push_completed }}
          POST_VERIFY_RESULT: ${{ steps.mirror.outputs.post_verify_result }}
          # Trigger and exact-main revalidation
          RUN_EVENT: ${{ github.event.workflow_run.event }}
          DISPATCH_REVALIDATION_OUTCOME: ${{ steps.dispatch_main_revalidation.outcome }}
          # Cleanup outcome
          CLEANUP_OUTCOME: ${{ steps.cleanup.outcome }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -uo pipefail

          # ── Compute sub-verdicts ──────────────────────────────────

          SIG_SHA_MATCH="not-run"
          if [ -n "${SIG_API_SHA:-}" ] && [ "${SIG_API_SHA}" = "${TARGET_SHA}" ]; then
            SIG_SHA_MATCH="true"
          elif [ -n "${SIG_API_SHA:-}" ]; then
            SIG_SHA_MATCH="false"
          fi

          EXACT_PARITY="not-run"
          if [ -n "${OBSERVED_SHA:-}" ] && [ "${OBSERVED_SHA}" = "${TARGET_SHA}" ]; then
            EXACT_PARITY="true"
          elif [ -n "${OBSERVED_SHA:-}" ]; then
            EXACT_PARITY="false"
          fi

          # Native push runs retain the established descendant-aware
          # concurrency semantics. GITHUB_TOKEN dispatch runs are stricter:
          # the pre-credential check must have run successfully and the fresh
          # main ref returned by the pinned runtime must still equal TARGET_SHA.
          TRIGGER_MAIN_OK="false"
          if [ "${RUN_EVENT:-}" = "push" ]; then
            TRIGGER_MAIN_OK="true"
          elif [ "${RUN_EVENT:-}" = "workflow_dispatch" ] \
             && [ "${DISPATCH_REVALIDATION_OUTCOME:-}" = "success" ] \
             && [ -n "${GITHUB_MAIN_SHA:-}" ] \
             && [ "${GITHUB_MAIN_SHA}" = "${TARGET_SHA}" ]; then
            TRIGGER_MAIN_OK="true"
          fi

          # ── Determine operational verdict (SIG-R169-Phase-B-CONC) ──
          #
          # SUCCESS: exact target parity (mirrored or already-mirrored)
          # SUPERSEDED: newer-valid-mirror-present (GitLab is ahead —
          #             a descendant of TARGET_SHA is already mirrored)
          # FAILED: everything else
          #
          # SIG-R169-Phase-B-FINAL-INVARIANTS-02: Common MIRROR_INVARIANTS_OK
          # required for BOTH SUCCESS and SUPERSEDED:
          #   - POST_VERIFY_RESULT == success
          #   - CLIENT_FP_VERIFIED == true
          #   - HOST_FP_VERIFIED == true
          #   - ERROR_CATEGORY == none (or empty)
          #   - ERROR_PHASE == none (or empty)
          #   - GITHUB_MAIN_SHA non-empty
          #   - dispatch pre-credential and final main parity, when dispatched
          #   - JOB_STATUS == success
          #   - CLEANUP_OUTCOME == success
          #
          # Push coherence per verdict:
          #   SUCCESS mirrored:       push_attempted=true,  push_completed=true
          #   SUCCESS already-mirrored: push_attempted=false, push_completed=false
          #   SUPERSEDED:             push_attempted=false, push_completed=false

          SIG_OK="false"
          if [ "${SIG_VERIFIED:-}" = "true" ] && [ "${SIG_SHA_MATCH}" = "true" ]; then
            SIG_OK="true"
          fi

          # SIG-R169-Phase-B-FINAL-INVARIANTS-02: Common mirror invariants
          MIRROR_INVARIANTS_OK="false"
          if [ "${POST_VERIFY_RESULT:-}" = "success" ] \
             && [ "${CLIENT_FP_VERIFIED:-}" = "true" ] \
             && [ "${HOST_FP_VERIFIED:-}" = "true" ] \
             && [ -z "${ERROR_CATEGORY:-}" -o "${ERROR_CATEGORY:-}" = "none" ] \
             && [ -z "${ERROR_PHASE:-}" -o "${ERROR_PHASE:-}" = "none" ] \
             && [ -n "${GITHUB_MAIN_SHA:-}" ] \
             && [ "${TRIGGER_MAIN_OK:-}" = "true" ] \
             && [ "${JOB_STATUS:-}" = "success" ] \
             && [ "${CLEANUP_OUTCOME:-}" = "success" ]; then
            MIRROR_INVARIANTS_OK="true"
          fi

          VERDICT="FAILED"

          # SUCCESS mirrored: exact parity + push_attempted=true + push_completed=true
          #   + invariants + sig
          if [ "${FINAL_RESULT:-}" = "mirrored" ] \
             && [ "$EXACT_PARITY" = "true" ] \
             && [ "${PUSH_ATTEMPTED:-}" = "true" ] \
             && [ "${PUSH_COMPLETED:-}" = "true" ] \
             && [ "$MIRROR_INVARIANTS_OK" = "true" ] \
             && [ "$SIG_OK" = "true" ]; then
            VERDICT="SUCCESS"
          fi

          # SUCCESS already-mirrored: exact parity + push_attempted=false + push_completed=false
          #   + invariants + sig
          if [ "${FINAL_RESULT:-}" = "already-mirrored" ] \
             && [ "$EXACT_PARITY" = "true" ] \
             && [ "${PUSH_ATTEMPTED:-}" = "false" ] \
             && [ "${PUSH_COMPLETED:-}" = "false" ] \
             && [ "$MIRROR_INVARIANTS_OK" = "true" ] \
             && [ "$SIG_OK" = "true" ]; then
            VERDICT="SUCCESS"
          fi

          # SUPERSEDED: newer-valid-mirror-present + exact parity false
          #   + observed_sha != TARGET_SHA + GITHUB_MAIN_SHA != TARGET_SHA
          #   + push coherence (either false/false OR true/true) + invariants + sig
          #
          # SIG-R169-Phase-B-CONC-R3-01: Two valid SUPERSEDED origins:
          #   1. PREEXISTING: GitLab was already ahead before this run
          #      (push_attempted=false, push_completed=false)
          #   2. AFTER_PUSH_RACE: this run pushed TARGET_SHA, then a newer
          #      mirror pushed a descendant before post-verification
          #      (push_attempted=true, push_completed=true)
          # Both are valid operational successes — no rollback needed.
          # Rejected: push_attempted=true + push_completed=false (push failed)
          #           push_attempted=false + push_completed=true (impossible)
          SUPERSEDED_PUSH_COHERENT="false"
          if [ "${PUSH_ATTEMPTED:-}" = "false" ] && [ "${PUSH_COMPLETED:-}" = "false" ]; then
            SUPERSEDED_PUSH_COHERENT="true"
          elif [ "${PUSH_ATTEMPTED:-}" = "true" ] && [ "${PUSH_COMPLETED:-}" = "true" ]; then
            SUPERSEDED_PUSH_COHERENT="true"
          fi

          if [ "${FINAL_RESULT:-}" = "newer-valid-mirror-present" ] \
             && [ "$EXACT_PARITY" = "false" ] \
             && [ -n "${OBSERVED_SHA:-}" ] \
             && [ "${OBSERVED_SHA:-}" != "$TARGET_SHA" ] \
             && [ -n "${GITHUB_MAIN_SHA:-}" ] \
             && [ "${GITHUB_MAIN_SHA:-}" != "$TARGET_SHA" ] \
             && [ "$SUPERSEDED_PUSH_COHERENT" = "true" ] \
             && [ "$MIRROR_INVARIANTS_OK" = "true" ] \
             && [ "$SIG_OK" = "true" ]; then
            VERDICT="SUPERSEDED"
          fi

          # ── Write summary ──────────────────────────────────────────
          {
            echo "## GitLab passive mirror — SIG-R169 Phase B"
            echo
            echo "### GitHub commit signature gate"
            echo
            echo "- Target SHA: \`$TARGET_SHA\`"
            echo "- API SHA: \`${SIG_API_SHA:-N/A}\`"
            echo "- Verified: \`${SIG_VERIFIED:-not-run}\`"
            echo "- Reason: \`${SIG_REASON:-N/A}\`"
            echo "- Verified at: \`${SIG_VERIFIED_AT:-N/A}\`"
            echo "- Attempts: \`${SIG_ATTEMPTS:-0}\`"
            echo "- Error category: \`${SIG_ERROR_CATEGORY:-none}\`"
            echo "- Target/API SHA match: \`$SIG_SHA_MATCH\`"
            echo
            echo "### Mirror result"
            echo
            echo "- Final result: \`${FINAL_RESULT:-not-run}\`"
            echo "- Trigger event: \`${RUN_EVENT:-unknown}\`"
            echo "- Job status: \`$JOB_STATUS\`"
            echo "- Observed GitLab SHA: \`${OBSERVED_SHA:-unknown}\`"
            echo "- Re-read GitHub SHA: \`${GITHUB_MAIN_SHA:-unknown}\`"
            echo "- Exact target parity: \`$EXACT_PARITY\`"
            echo "- Dispatch pre-credential check: \`${DISPATCH_REVALIDATION_OUTCOME:-not-applicable}\`"
            echo "- Trigger/main invariant: \`$TRIGGER_MAIN_OK\`"
            echo "- Error category: \`${ERROR_CATEGORY:-none}\`"
            echo "- Error phase: \`${ERROR_PHASE:-none}\`"
            echo
            echo "### Fingerprint verification"
            echo
            echo "- Client key verified: \`${CLIENT_FP_VERIFIED:-not-run}\`"
            echo "  - Expected: \`$EXPECTED_KEY_FP\`"
            echo "  - Actual:   \`${CLIENT_FP_ACTUAL:-N/A}\`"
            echo "- Host key verified: \`${HOST_FP_VERIFIED:-not-run}\`"
            echo "  - Expected: \`$EXPECTED_HOST_FP\`"
            echo "  - Actual:   \`${HOST_FP_ACTUAL:-N/A}\`"
            echo
            echo "### Push details"
            echo
            echo "- Push attempted: \`${PUSH_ATTEMPTED:-false}\`"
            echo "- Push completed: \`${PUSH_COMPLETED:-false}\`"
            echo "- Post-verification: \`${POST_VERIFY_RESULT:-not-run}\`"
            echo
            echo "### Cleanup"
            echo
            echo "- Cleanup outcome: \`${CLEANUP_OUTCOME:-not-run}\`"
            echo
            echo "### Final verdict"
            echo
            echo "- **Operational result: $VERDICT**"
            echo
            if [ "$VERDICT" = "SUCCESS" ]; then
              echo "- **Signature gate: PASSED**"
              echo "- **Mirror: SUCCESS (${FINAL_RESULT:-})**"
              echo "- **Exact target parity: true**"
            elif [ "$VERDICT" = "SUPERSEDED" ]; then
              echo "- **Signature gate: PASSED**"
              echo "- **Mirror: SUPERSEDED (${FINAL_RESULT:-})**"
              echo "- **Exact target parity: false (GitLab is ahead)**"
              echo "- **Post-verify: ${POST_VERIFY_RESULT:-}**"
            else
              echo "- **Signature gate: ${SIG_ERROR_CATEGORY:-FAILED}**"
              echo "- **Mirror: ${FINAL_RESULT:-not-run}**"
              echo "- **Exact target parity: $EXACT_PARITY**"
            fi
            echo
            echo "### Architecture"
            echo
            echo "- Verifier: \`trusted-verifier/scripts/ci/verify-github-commit-signature.sh\`"
            echo "- Mirror runtime: \`trusted-verifier/scripts/ci/mirror-main-to-gitlab.sh\`"
            echo "- Verifier SHA (immutable pin): \`$TRUSTED_VERIFIER_SHA\`"
            echo "- GitLab pipeline requested: \`no\`"
            echo "- Force push used: \`no\`"
          } >> "$GITHUB_STEP_SUMMARY"

          # Publish verdict as step output
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "exact_parity=$EXACT_PARITY" >> "$GITHUB_OUTPUT"

          # ── Execute verdict (SIG-R169-Phase-B-FINAL) ───────────────
          # FAILED → exit 1 (job goes red)
          # SUCCESS or SUPERSEDED → exit 0 (job stays green)
          if [ "$VERDICT" = "FAILED" ]; then
            echo "::error::Final verdict: FAILED"
            exit 1
          fi

          echo "✓ Final verdict: $VERDICT"
          exit 0

# GitHub Actions quota and cache-storage observability.
#
# This workflow is deliberately read-only: it never deletes caches. API errors,
# malformed responses, incomplete pagination, and critical quota usage fail the
# job instead of publishing optimistic or partial numbers.

name: Quota Report

on:
  schedule:
    - cron: '0 0 * * 1'  # Weekly Monday 00:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read

jobs:
  quota-report:
    name: Quota Report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CACHE_WARNING_PERCENT: '70'
      CACHE_CRITICAL_PERCENT: '85'
      STALE_WARNING_PERCENT: '10'
      CACHE_RETENTION_DAYS: '7'
      # The automatic GITHUB_TOKEN cannot read the repository-admin
      # storage-limit endpoint. This owner-managed variable is validated below
      # and must mirror the effective GitHub cache setting.
      CACHE_LIMIT_GB: ${{ vars.ACTIONS_CACHE_LIMIT_GB }}
    steps:
      - name: Generate fail-closed repository storage report
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_API_URL: ${{ github.api_url }}
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from __future__ import annotations

          import html
          import json
          import os
          import re
          import sys
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          from collections import defaultdict
          from datetime import datetime, timedelta, timezone
          from typing import Any

          API_VERSION = "2026-03-10"
          MAX_PAGES = 1_000
          PAGE_SIZE = 100
          REQUEST_ATTEMPTS = 3


          class ReportError(RuntimeError):
              """The report cannot safely publish complete metrics."""


          class SnapshotChanged(ReportError):
              """The cache collection changed while it was being paginated."""


          def require_env(name: str) -> str:
              value = os.environ.get(name, "").strip()
              if not value:
                  raise ReportError(f"missing required environment variable {name}")
              return value


          def percent_env(name: str) -> float:
              raw = require_env(name)
              try:
                  value = float(raw)
              except ValueError as exc:
                  raise ReportError(f"{name} must be numeric") from exc
              if not 0 <= value <= 100:
                  raise ReportError(f"{name} must be between 0 and 100")
              return value


          def positive_int_env(name: str) -> int:
              raw = require_env(name)
              try:
                  value = int(raw)
              except ValueError as exc:
                  raise ReportError(f"{name} must be an integer") from exc
              if value <= 0:
                  raise ReportError(f"{name} must be positive")
              return value


          def workflow_escape(value: str) -> str:
              return value.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")


          def annotation(level: str, title: str, message: str) -> None:
              print(f"::{level} title={workflow_escape(title)}::{workflow_escape(message)}")


          def markdown(value: str) -> str:
              return html.escape(value, quote=True).replace("|", "&#124;").replace("\r", " ").replace("\n", " ")


          def require_mapping(value: Any, context: str) -> dict[str, Any]:
              if not isinstance(value, dict):
                  raise ReportError(f"{context} must be a JSON object")
              return value


          def require_list(value: Any, context: str) -> list[Any]:
              if not isinstance(value, list):
                  raise ReportError(f"{context} must be a JSON array")
              return value


          def require_string(mapping: dict[str, Any], key: str, context: str) -> str:
              value = mapping.get(key)
              if not isinstance(value, str) or not value:
                  raise ReportError(f"{context}.{key} must be a non-empty string")
              return value


          def require_nonnegative_int(mapping: dict[str, Any], key: str, context: str) -> int:
              value = mapping.get(key)
              if isinstance(value, bool) or not isinstance(value, int) or value < 0:
                  raise ReportError(f"{context}.{key} must be a non-negative integer")
              return value


          token = require_env("GH_TOKEN")
          repository = require_env("GH_REPOSITORY")
          api_url = require_env("GH_API_URL").rstrip("/")
          summary_path = require_env("GITHUB_STEP_SUMMARY")

          if not re.fullmatch(r"[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+", repository):
              raise ReportError("GH_REPOSITORY has an invalid owner/repository form")
          if not api_url.startswith("https://"):
              raise ReportError("GH_API_URL must use HTTPS")


          def api_json(path: str, *, allow_not_found: bool = False) -> dict[str, Any] | None:
              url = f"{api_url}/{path.lstrip('/')}"
              headers = {
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "User-Agent": "ariad-quota-report",
                  "X-GitHub-Api-Version": API_VERSION,
              }

              for attempt in range(1, REQUEST_ATTEMPTS + 1):
                  request = urllib.request.Request(url, headers=headers, method="GET")
                  try:
                      with urllib.request.urlopen(request, timeout=30) as response:
                          if response.status != 200:
                              raise ReportError(f"GET {path} returned unexpected HTTP {response.status}")
                          raw = response.read()
                  except urllib.error.HTTPError as exc:
                      if allow_not_found and exc.code == 404:
                          return None
                      if exc.code in {429, 500, 502, 503, 504} and attempt < REQUEST_ATTEMPTS:
                          time.sleep(attempt)
                          continue
                      raise ReportError(f"GET {path} failed with HTTP {exc.code}") from exc
                  except (urllib.error.URLError, TimeoutError) as exc:
                      if attempt < REQUEST_ATTEMPTS:
                          time.sleep(attempt)
                          continue
                      raise ReportError(f"GET {path} failed after {REQUEST_ATTEMPTS} attempts") from exc

                  try:
                      parsed = json.loads(raw)
                  except (json.JSONDecodeError, UnicodeDecodeError) as exc:
                      raise ReportError(f"GET {path} returned invalid JSON") from exc
                  return require_mapping(parsed, f"GET {path} response")

              raise ReportError(f"GET {path} exhausted retries")


          def cache_page(page: int) -> tuple[int, list[dict[str, Any]]]:
              response = api_json(
                  f"repos/{repository}/actions/caches?per_page={PAGE_SIZE}&page={page}"
              )
              assert response is not None
              total = require_nonnegative_int(response, "total_count", "cache list")
              raw_caches = require_list(response.get("actions_caches"), "cache list.actions_caches")
              if len(raw_caches) > PAGE_SIZE:
                  raise ReportError("cache list returned more entries than requested")

              caches: list[dict[str, Any]] = []
              for index, raw_cache in enumerate(raw_caches):
                  cache = require_mapping(raw_cache, f"cache page {page} entry {index}")
                  cache_id = require_nonnegative_int(cache, "id", f"cache page {page} entry {index}")
                  ref = require_string(cache, "ref", f"cache {cache_id}")
                  size = require_nonnegative_int(cache, "size_in_bytes", f"cache {cache_id}")
                  last_accessed = require_string(cache, "last_accessed_at", f"cache {cache_id}")
                  caches.append(
                      {
                          "id": cache_id,
                          "ref": ref,
                          "size_in_bytes": size,
                          "last_accessed_at": last_accessed,
                      }
                  )
              return total, caches


          def list_all_caches_once() -> list[dict[str, Any]]:
              expected_total: int | None = None
              caches: list[dict[str, Any]] = []

              for page in range(1, MAX_PAGES + 1):
                  total, entries = cache_page(page)
                  if expected_total is None:
                      expected_total = total
                  elif total != expected_total:
                      raise SnapshotChanged(
                          f"cache total changed during pagination ({expected_total} -> {total})"
                      )

                  caches.extend(entries)
                  if len(caches) >= expected_total:
                      break
                  if len(entries) < PAGE_SIZE:
                      break
              else:
                  raise ReportError(f"cache pagination exceeded {MAX_PAGES} pages")

              if expected_total is None or len(caches) != expected_total:
                  raise SnapshotChanged(
                      f"cache pagination returned {len(caches)} of {expected_total} entries"
                  )
              cache_ids = [cache["id"] for cache in caches]
              if len(cache_ids) != len(set(cache_ids)):
                  raise SnapshotChanged("cache pagination returned duplicate cache IDs")
              return caches


          def list_all_caches() -> list[dict[str, Any]]:
              last_error: SnapshotChanged | None = None
              for attempt in range(1, REQUEST_ATTEMPTS + 1):
                  try:
                      return list_all_caches_once()
                  except SnapshotChanged as exc:
                      last_error = exc
                      if attempt < REQUEST_ATTEMPTS:
                          time.sleep(attempt)
              raise ReportError(
                  f"could not obtain a stable cache snapshot after {REQUEST_ATTEMPTS} attempts: {last_error}"
              )


          def parse_timestamp(value: str, context: str) -> datetime:
              normalized = value[:-1] + "+00:00" if value.endswith("Z") else value
              try:
                  parsed = datetime.fromisoformat(normalized)
              except ValueError as exc:
                  raise ReportError(f"{context} is not a valid ISO-8601 timestamp") from exc
              if parsed.tzinfo is None:
                  raise ReportError(f"{context} must include a timezone")
              return parsed.astimezone(timezone.utc)


          def format_bytes(value: int) -> str:
              amount = float(value)
              units = ("B", "KiB", "MiB", "GiB", "TiB")
              for unit in units:
                  if amount < 1024 or unit == units[-1]:
                      decimals = 0 if unit == "B" else 2
                      return f"{amount:.{decimals}f} {unit}"
                  amount /= 1024
              raise AssertionError("unreachable")


          def iso_date(value: datetime) -> str:
              return value.strftime("%Y-%m-%d %H:%M UTC")


          def main() -> int:
              warning_threshold = percent_env("CACHE_WARNING_PERCENT")
              critical_threshold = percent_env("CACHE_CRITICAL_PERCENT")
              stale_warning_threshold = percent_env("STALE_WARNING_PERCENT")
              retention_days = positive_int_env("CACHE_RETENTION_DAYS")
              max_cache_size_gb = positive_int_env("CACHE_LIMIT_GB")
              if warning_threshold >= critical_threshold:
                  raise ReportError("CACHE_WARNING_PERCENT must be lower than CACHE_CRITICAL_PERCENT")

              usage = api_json(f"repos/{repository}/actions/cache/usage")
              runs = api_json(f"repos/{repository}/actions/runs?per_page=1")
              rate_limit = api_json("rate_limit")
              repository_info = api_json(f"repos/{repository}")
              assert usage is not None
              assert runs is not None and rate_limit is not None and repository_info is not None

              full_name = require_string(repository_info, "full_name", "repository")
              default_branch = require_string(repository_info, "default_branch", "repository")
              if full_name.casefold() != repository.casefold():
                  raise ReportError(
                      f"repository lookup returned {full_name!r} for {repository!r}"
                  )
              default_ref = f"refs/heads/{default_branch}"
              default_suffix = urllib.parse.quote(f"heads/{default_branch}", safe="/")
              resolved_default = api_json(
                  f"repos/{repository}/git/ref/{default_suffix}"
              )
              assert resolved_default is not None
              if require_string(resolved_default, "ref", "default branch Git ref") != default_ref:
                  raise ReportError("default branch Git reference did not resolve exactly")

              usage_count = require_nonnegative_int(usage, "active_caches_count", "cache usage")
              usage_size = require_nonnegative_int(usage, "active_caches_size_in_bytes", "cache usage")
              limit_size = max_cache_size_gb * 1_000_000_000

              total_runs = require_nonnegative_int(runs, "total_count", "workflow runs")
              resources = require_mapping(rate_limit.get("resources"), "rate limit.resources")
              core = require_mapping(resources.get("core"), "rate limit.resources.core")
              search = require_mapping(resources.get("search"), "rate limit.resources.search")
              core_remaining = require_nonnegative_int(core, "remaining", "core rate limit")
              core_limit = require_nonnegative_int(core, "limit", "core rate limit")
              search_remaining = require_nonnegative_int(search, "remaining", "search rate limit")
              search_limit = require_nonnegative_int(search, "limit", "search rate limit")

              caches = list_all_caches()
              listed_count = len(caches)
              listed_size = sum(cache["size_in_bytes"] for cache in caches)

              refs = sorted({cache["ref"] for cache in caches})
              stale_refs: set[str] = set()
              for ref in refs:
                  if not ref.startswith("refs/") or ref == "refs/":
                      raise ReportError(f"cache {ref!r} does not contain a full Git reference")
                  suffix = urllib.parse.quote(ref[len("refs/"):], safe="/")
                  git_ref = api_json(
                      f"repos/{repository}/git/ref/{suffix}", allow_not_found=True
                  )
                  if git_ref is None:
                      stale_refs.add(ref)
                      continue
                  actual_ref = require_string(git_ref, "ref", f"Git reference {ref}")
                  if actual_ref != ref:
                      raise ReportError(f"Git reference lookup returned {actual_ref!r} for {ref!r}")

              now = datetime.now(timezone.utc)
              retention_cutoff = now - timedelta(days=retention_days)
              for cache in caches:
                  cache["last_accessed"] = parse_timestamp(
                      cache["last_accessed_at"], f"cache {cache['id']}.last_accessed_at"
                  )

              stale_caches = [cache for cache in caches if cache["ref"] in stale_refs]
              stale_size = sum(cache["size_in_bytes"] for cache in stale_caches)
              stale_share = (stale_size / listed_size * 100) if listed_size else 0.0
              beyond_retention = [
                  cache for cache in caches if cache["last_accessed"] < retention_cutoff
              ]
              beyond_retention_size = sum(cache["size_in_bytes"] for cache in beyond_retention)

              # The usage endpoint may lag by about five minutes. Use the larger
              # snapshot so the capacity percentage never understates observed usage.
              observed_size = max(usage_size, listed_size)
              usage_percent = observed_size / limit_size * 100
              remaining_size = max(limit_size - observed_size, 0)

              warnings: list[str] = []
              critical: list[str] = []
              if usage_count != listed_count or usage_size != listed_size:
                  warnings.append(
                      "The cache usage and paginated list snapshots differ; the report uses "
                      "the larger byte value for quota evaluation."
                  )
              if usage_percent >= critical_threshold:
                  critical.append(
                      f"Cache usage is {usage_percent:.2f}%, at or above the "
                      f"{critical_threshold:g}% critical threshold."
                  )
              elif usage_percent >= warning_threshold:
                  warnings.append(
                      f"Cache usage is {usage_percent:.2f}%, at or above the "
                      f"{warning_threshold:g}% warning threshold."
                  )
              if stale_caches and stale_share >= stale_warning_threshold:
                  warnings.append(
                      f"Caches attached to obsolete refs use {stale_share:.2f}% of the listed cache bytes."
                  )
              if beyond_retention:
                  warnings.append(
                      f"{len(beyond_retention)} dependency-cache entries have not been accessed "
                      f"within the {retention_days}-day cache-retention review window."
                  )

              status = "CRITICAL" if critical else "WARNING" if warnings else "HEALTHY"
              generated_at = iso_date(now)
              lines = [
                  "# Repository Health Report",
                  "",
                  f"Generated at {generated_at}. Status: **{status}**.",
                  "",
                  "## GitHub Actions cache storage",
                  "",
                  "| Metric | Value |",
                  "|---|---:|",
                  f"| Active caches (usage API) | {usage_count} |",
                  f"| Active caches (complete paginated list) | {listed_count} |",
                  f"| Active cache size (usage API) | {format_bytes(usage_size)} |",
                  f"| Active cache size (paginated list) | {format_bytes(listed_size)} |",
                  f"| Conservative observed size | {format_bytes(observed_size)} |",
                  f"| Configured storage limit | {max_cache_size_gb} GB ({format_bytes(limit_size)}) |",
                  f"| Usage versus limit | {usage_percent:.2f}% |",
                  f"| Capacity remaining | {format_bytes(remaining_size)} |",
                  f"| Default branch | <code>{markdown(default_branch)}</code> |",
                  f"| Distinct active refs | {len(refs) - len(stale_refs)} |",
                  f"| Obsolete refs | {len(stale_refs)} |",
                  f"| Caches on obsolete refs | {len(stale_caches)} |",
                  f"| Size on obsolete refs | {format_bytes(stale_size)} ({stale_share:.2f}% of listed bytes) |",
                  f"| Dependency caches not accessed within {retention_days} days | {len(beyond_retention)} ({format_bytes(beyond_retention_size)}) |",
                  "",
                  "Thresholds: warning at "
                  f"{warning_threshold:g}%, critical failure at {critical_threshold:g}%, "
                  f"and obsolete-ref warning at {stale_warning_threshold:g}% of listed bytes.",
                  "This report measures dependency caches only. Artifact and workflow-log "
                  "retention is a separate repository setting.",
                  "",
              ]

              if stale_refs:
                  grouped: dict[str, list[dict[str, Any]]] = defaultdict(list)
                  for cache in stale_caches:
                      grouped[cache["ref"]].append(cache)
                  lines.extend(
                      [
                          "### Obsolete cache refs",
                          "",
                          "A ref is obsolete only when GitHub's Git reference endpoint returns 404.",
                          "",
                          "| Ref | Caches | Size | Most recent access |",
                          "|---|---:|---:|---|",
                      ]
                  )
                  for ref in sorted(grouped):
                      ref_caches = grouped[ref]
                      ref_size = sum(cache["size_in_bytes"] for cache in ref_caches)
                      most_recent = max(cache["last_accessed"] for cache in ref_caches)
                      lines.append(
                          f"| <code>{markdown(ref)}</code> | {len(ref_caches)} | {format_bytes(ref_size)} | "
                          f"{iso_date(most_recent)} |"
                      )
                  lines.append("")
              else:
                  lines.extend(["### Obsolete cache refs", "", "None detected.", ""])

              lines.extend(
                  [
                      "## API and workflow activity",
                      "",
                      "| Metric | Value |",
                      "|---|---:|",
                      f"| All workflow runs visible to API | {total_runs} |",
                      f"| Core API remaining | {core_remaining} / {core_limit} |",
                      f"| Search API remaining | {search_remaining} / {search_limit} |",
                      "",
                      "## Safety policy",
                      "",
                      "This workflow is read-only. It never deletes caches and never uses a custom secret. "
                      "Review and deletion, when justified, remain explicit maintainer actions.",
                      "",
                  ]
              )

              if warnings or critical:
                  lines.extend(["## Alerts", ""])
                  for message in warnings:
                      lines.append(f"- WARNING: {message}")
                  for message in critical:
                      lines.append(f"- CRITICAL: {message}")
                  lines.append("")

              with open(summary_path, "a", encoding="utf-8", newline="\n") as summary:
                  summary.write("\n".join(lines))

              for message in warnings:
                  annotation("warning", "Actions cache storage", message)
              for message in critical:
                  annotation("error", "Actions cache storage", message)
              annotation(
                  "notice",
                  "Actions cache storage",
                  f"{listed_count} caches, {format_bytes(observed_size)} of "
                  f"{max_cache_size_gb} GB ({usage_percent:.2f}%).",
              )
              return 1 if critical else 0


          try:
              raise SystemExit(main())
          except Exception as exc:
              message = f"Report failed closed: {exc}"
              annotation("error", "Quota report failure", message)
              try:
                  with open(summary_path, "a", encoding="utf-8", newline="\n") as summary:
                      summary.write(
                          "# Repository Health Report\n\n"
                          f"**FAILED CLOSED:** {markdown(str(exc))}\n\n"
                          "No partial or estimated storage result was accepted.\n"
                      )
              except OSError:
                  pass
              raise SystemExit(1)
          PY

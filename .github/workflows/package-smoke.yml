# R168.3a — Package smoke test
# R169 final fix: add workflow file to paths, extend source paths, honest job name
#
# Tests that npm pack produces a valid tarball with UI assets,
# and that the installed package CLI works from an arbitrary cwd.
# The prepack hook (build-package.mjs) must build everything autonomously.

name: Package Smoke

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/package-smoke.yml'
      - 'v2/package.json'
      - 'v2/package-lock.json'
      - 'v2/scripts/build-package.mjs'
      - 'v2/src/**'
      - 'v2/tsconfig.json'
      - 'graph-ui/package.json'
      - 'graph-ui/package-lock.json'
      - 'graph-ui/src/**'
      - 'graph-ui/public/**'
      - 'graph-ui/vite.config.*'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/package-smoke.yml'
      - 'v2/package.json'
      - 'v2/package-lock.json'
      - 'v2/scripts/build-package.mjs'
      - 'v2/src/**'
      - 'v2/tsconfig.json'
      - 'graph-ui/package.json'
      - 'graph-ui/package-lock.json'
      - 'graph-ui/src/**'
      - 'graph-ui/public/**'
      - 'graph-ui/vite.config.*'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  package-smoke:
    name: npm pack + install + CLI smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: v2/package-lock.json

      - name: npm ci (v2 only)
        working-directory: v2
        run: npm ci

      - name: npm pack (triggers prepack autonomously)
        working-directory: v2
        run: |
          PACK_DIR="$RUNNER_TEMP/cbm-pack"
          mkdir -p "$PACK_DIR"
          npm pack --pack-destination "$PACK_DIR"
          TARBALLS=()
          while IFS= read -r f; do
            TARBALLS+=("$f")
          done < <(find "$PACK_DIR" -maxdepth 1 -type f -name '*.tgz' -print)
          if [ "${#TARBALLS[@]}" -ne 1 ]; then
            echo "ERROR: Expected exactly 1 tarball, found ${#TARBALLS[@]}" >&2
            exit 1
          fi
          TARBALL="${TARBALLS[0]}"
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Inspect tarball contents
        run: |
          echo "=== Tarball contents ==="
          tar -tf "${{ env.TARBALL }}" | sort
          CONTENTS=$(tar -tf "${{ env.TARBALL }}")
          for required in \
            "package/package.json" \
            "package/LICENSE" \
            "package/README.md" \
            "package/CHANGELOG.md" \
            "package/dist/cli/index.js" \
            "package/dist/ui/index.html"; do
            if echo "$CONTENTS" | grep -q "^$required$"; then
              echo "  ok: $required"
            else
              echo "  MISSING: $required"
              exit 1
            fi
          done
          for forbidden in \
            "package/src/" \
            "package/tests/" \
            "package/node_modules/" \
            "package/.git"; do
            if echo "$CONTENTS" | grep -q "^$forbidden"; then
              echo "  FORBIDDEN: $forbidden"
              exit 1
            fi
          done

      - name: Install tarball in temp directory
        run: |
          mkdir -p /tmp/cbm-install
          npm install --prefix /tmp/cbm-install "${{ env.TARBALL }}"

      - name: CLI smoke test from arbitrary cwd
        working-directory: /tmp
        run: |
          /tmp/cbm-install/node_modules/.bin/cbm-v2 --version
          /tmp/cbm-install/node_modules/.bin/cbm-v2 --help

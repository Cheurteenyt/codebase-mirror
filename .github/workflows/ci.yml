# GitHub Actions CI for Codebase Memory V2
# Runs typecheck, build, and tests on every push and pull request.
# This is the primary CI — GitLab CI is a lightweight mirror only.
# Public repos on GitHub have unlimited Actions minutes.
#
# R50: added quota-report job that uses the automatic GITHUB_TOKEN
# R52: security hardening (least-privilege permissions), perf (npm ci),
#      quality (single-parse API calls, no redundant build).

name: CI

on:
  push:
    branches: [main, 'v2/**']
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'

# Cancel in-progress runs for the same branch (saves minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# R52: least-privilege — the default GITHUB_TOKEN has write permissions
# we don't need. Restrict to read-only for all jobs.
permissions:
  contents: read

jobs:
  # ── Backend (v2): typecheck + build + test ─────────────────────
  backend:
    name: Backend (v2)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    defaults:
      run:
        working-directory: v2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: v2/package.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npx vitest run

  # ── Frontend (graph-ui): typecheck + build + test ──────────────
  frontend:
    name: Frontend (graph-ui)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    defaults:
      run:
        working-directory: graph-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: graph-ui/package.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npx vitest run

  # ── Quota Report (R50, R52) ───────────────────────────────────
  # Uses the automatic GITHUB_TOKEN — no manual configuration needed.
  # R52: single API call + single parse, least-privilege permissions.
  quota-report:
    name: Quota Report
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    steps:
      - name: Generate quota report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Quota Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Single API call + single Python parse for all rate limit data
          RATE_LIMIT=$(curl -s -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/rate_limit")

          echo "$RATE_LIMIT" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          core = d['resources']['core']
          search = d['resources']['search']
          print('### GitHub API Rate Limits')
          print()
          print('| Resource | Remaining | Limit |')
          print('|----------|-----------|-------|')
          print(f'| Core API | {core[\"remaining\"]} | {core[\"limit\"]} |')
          print(f'| Search API | {search[\"remaining\"]} | {search[\"limit\"]} |')
          print()
          " >> $GITHUB_STEP_SUMMARY

          # Single API call for Actions runs count
          RUNS_RESPONSE=$(curl -s -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=1")

          TOTAL_RUNS=$(echo "$RUNS_RESPONSE" | python3 -c "import json,sys; print(json.load(sys.stdin).get('total_count', 0))")

          echo "### GitHub Actions (last 30 days)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total runs | $TOTAL_RUNS |" >> $GITHUB_STEP_SUMMARY
          echo "| Actions minutes | Unlimited (public repo) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Public repos have unlimited Actions minutes." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub Actions: unlimited (public repo)" >> $GITHUB_STEP_SUMMARY
          echo "- GitLab CI: ~1% usage (mirror only)" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub API: 5000 req/hr (authenticated)" >> $GITHUB_STEP_SUMMARY

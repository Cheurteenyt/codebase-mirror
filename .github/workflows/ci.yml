# GitHub Actions CI for Codebase Memory V2
# Runs the complete validation gate on pushes to main, pushes to v2 work
# branches, and pull requests: backend, frontend, npm package smoke, and
# Docker smoke.
# This is the canonical CI — GitHub is the canonical repository since R166
# and GitLab is a passive main-only mirror with no pipelines.
# Standard GitHub-hosted runners are free for public repositories; larger
# runners and storage follow separate billing/limits.
#
# R50: added quota-report job that uses the automatic GITHUB_TOKEN
# R52: security hardening (least-privilege permissions), perf (npm ci),
#      quality (single-parse API calls, no redundant build).
# R55 (D3): added job-level `permissions: actions: read` override for
#      quota-report — the workflow-level `permissions: contents: read`
#      was silently breaking its /repos/.../actions/runs API call
#      (every unlisted scope becomes `none` once any `permissions:` key
#      is set at workflow level).
# AI continuity: pushes from reset-prone implementation environments land on
#      `v2/**` before a PR exists, so branch checkpoints need authoritative CI.
#      The mirror remains main-only in mirror-main-to-gitlab.yml.
# R166: removed all references to the GitLab → GitHub mirror; GitHub is
#      now canonical and GitLab only receives fast-forward mirror pushes
#      from this repository via mirror-main-to-gitlab.yml.
# R55 (D5): restricted quota-report to schedule-only — running it on every
#      push to main added noise without value (rate limits reset hourly;
#      the weekly schedule is the actual trend signal).
# R112: moved quota-report to its own workflow file (quota-report.yml).
#       Previously, `if: github.event_name == 'schedule'` caused the job
#       to be skipped on push/PR, and GitHub Actions reported skipped jobs
#       as "1 error" in annotations, making the pipeline look failed.
#       Now this workflow only runs validation jobs on push/PR — no
#       schedule-only job, no false skipped-job annotations.

name: CI

on:
  push:
    branches:
      - main
      - "v2/**"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      expected_sha:
        description: Exact lowercase main commit SHA that must be validated
        required: true
        type: string

# Cancel in-progress runs for the same branch (saves minutes).
# R116: set cancel-in-progress: false — previously true, which cancelled
# the Frontend (graph-ui) job mid-install when a new push to main happened.
# graph-ui's npm install can take 60-90s, and the cancel produced a false
# "This job was cancelled" error. With false, in-progress runs complete
# naturally; new runs queue behind them.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

# R52: least-privilege — the default GITHUB_TOKEN has write permissions
# we don't need. Restrict to read-only for all jobs.
# The schedule-only quota report lives in quota-report.yml with its own
# `actions: read` permission. All five validation jobs remain contents-read only.
permissions:
  contents: read

jobs:
  # A squash merge performed with GITHUB_TOKEN does not emit a new push
  # workflow. The approved GLM gate therefore dispatches this workflow at
  # main with the exact merge SHA. Fail closed before any repository code is
  # checked out if the ref, checkout SHA, input, or live main ref diverges.
  preflight:
    name: Exact main SHA preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Validate dispatched main identity
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_API_URL: ${{ github.api_url }}
          GH_REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_REF: ${{ github.ref }}
          EVENT_SHA: ${{ github.sha }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          import os
          import re
          import sys
          import urllib.error
          import urllib.request

          API_VERSION = "2026-03-10"
          EXPECTED_REPOSITORY = "Cheurteenyt/Ariad"
          SHA_PATTERN = re.compile(r"[0-9a-f]{40}")

          event = os.environ["EVENT_NAME"]
          repository = os.environ["GH_REPOSITORY"]

          def fail(message):
              print(f"::error::{message}", file=sys.stderr)
              raise SystemExit(1)

          if repository != EXPECTED_REPOSITORY:
              fail("This exact-SHA gate is bound to Cheurteenyt/Ariad.")

          if event != "workflow_dispatch":
              if event not in {"push", "pull_request"}:
                  fail(f"Unexpected CI event: {event}")
              print(f"Native {event} CI event accepted; dispatch SHA gate not required.")
              raise SystemExit(0)

          ref = os.environ["EVENT_REF"]
          event_sha = os.environ["EVENT_SHA"]
          expected_sha = os.environ["EXPECTED_SHA"]
          if ref != "refs/heads/main":
              fail(f"Dispatched CI must run on refs/heads/main, got: {ref}")
          if not SHA_PATTERN.fullmatch(expected_sha):
              fail("expected_sha must be an exact lowercase 40-character commit SHA.")
          if event_sha != expected_sha:
              fail("github.sha does not match the dispatched expected_sha.")

          request = urllib.request.Request(
              f"{os.environ['GH_API_URL'].rstrip('/')}/repos/{repository}/git/ref/heads/main",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "X-GitHub-Api-Version": API_VERSION,
                  "User-Agent": "ariad-ci-exact-sha",
              },
          )
          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  main_ref = json.load(response)
          except urllib.error.HTTPError as exc:
              detail = exc.read().decode("utf-8", "replace")[:1000]
              fail(f"GitHub main-ref API failed ({exc.code}): {detail}")
          except (urllib.error.URLError, TimeoutError, json.JSONDecodeError) as exc:
              fail(f"GitHub main-ref API failed: {exc}")

          main_object = main_ref.get("object") or {}
          if (
              main_ref.get("ref") != "refs/heads/main"
              or main_object.get("type") != "commit"
              or main_object.get("sha") != expected_sha
          ):
              fail("The live GitHub main ref does not resolve to expected_sha.")

          print(f"Exact dispatched main SHA verified: {expected_sha}")
          PY

  # ── Backend (v2): typecheck + build + test ─────────────────────
  backend:
    name: Backend (v2)
    needs: preflight
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    # R116: explicit timeout so a hung install/test doesn't run forever.
    timeout-minutes: 15
    defaults:
      run:
        working-directory: v2
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          # Pin-contract tests inspect the immutable runtime commit itself.
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22.12.0'
          cache: 'npm'
          cache-dependency-path: v2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Documentation integrity
        run: npm run docs:check

      # SIG-R4-CI-01: ShellCheck security-critical CI scripts.
      # SIG-R6: Moved BEFORE Vitest so ShellCheck always runs even if tests
      # fail (steps after a failure are skipped by default).
      # Action pinned by SHA (tag 2.0.0 → 00cae500b08a931fb5698e11e79bfbd38e612a38).
      # ShellCheck binary version pinned to v0.10.0 for reproducibility
      # (SUPPLY-R5-01). The step runs inside the Backend job — no new
      # required check. Verified: 2026-07-13.
      - name: ShellCheck security-critical CI scripts
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          severity: warning
          scandir: ./scripts/ci
          version: v0.10.0

      - name: Test
        shell: bash
        run: |
          # The mirror runtime suite launches many short-lived Git processes.
          # Keep it out of the general worker pool to avoid runner-level
          # process contention while preserving fail-closed assertions.
          npx vitest run --exclude tests/ci/r168-mirror-runtime.test.ts
          npx vitest run tests/ci/r168-mirror-runtime.test.ts \
            --maxWorkers=1 \
            --no-file-parallelism

      # R90: Incremental benchmark with correctness invariants
      - name: Incremental benchmark invariants
        run: npm run bench:incremental:smoke

      # R169B-STEP3: Publication benchmark invariants (GPT 5.6 Pass 1
      # audit, PERF-R169B-A1-22). Runs the publication benchmark smoke
      # variant to verify the publisher primitives remain fast and
      # correct on every PR.
      - name: Publication benchmark invariants
        run: npm run bench:publication:smoke

  windows-smoke:
    name: Windows smoke (v2)
    needs: preflight
    runs-on: windows-latest
    if: github.event_name != 'schedule'
    timeout-minutes: 15
    defaults:
      run:
        working-directory: v2
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22.12.0'
          cache: 'npm'
          cache-dependency-path: v2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Documentation integrity
        run: npm run docs:check

      - name: Targeted Windows product tests
        run: >-
          npx vitest run
          tests/indexer/discovery-mode.test.ts
          tests/indexer/windows-worker-url.test.ts
          tests/intelligence/graph-status.test.ts
          tests/mcp/server.test.ts
          tests/round27-bug8-rename.test.ts
          tests/round29-watch.test.ts
          tests/storage/project-path.test.ts
          tests/ci/windows-update-readiness.test.ts

      - name: UI lifecycle and security regressions (Windows)
        run: >-
          npx vitest run
          tests/ui/ui-allowed-roots.test.ts
          tests/ui/ui-bounded-shutdown.test.ts
          tests/ui/ui-index-child-backpressure.test.ts
          tests/ui/ui-index-child-ownership.test.ts
          tests/ui/ui-localhost-origin-security.test.ts
          tests/ui/ui-project-delete-identity.test.ts
          tests/ui/ui-project-health-reader-close.test.ts
          tests/ui/ui-project-registry-review-regressions.test.ts
          tests/ui/ui-project-store-routing.test.ts
          tests/ui/ui-reader-refresh-after-index.test.ts
          tests/ui/ui-start-bind.test.ts
          tests/ui/ui-static-cache-policy.test.ts
          tests/ui/ui-websocket-origin-security.test.ts

      - name: Incremental benchmark invariants
        run: npm run bench:incremental:smoke

  # ── Frontend (graph-ui): typecheck + build + test ──────────────
  frontend:
    name: Frontend (graph-ui)
    needs: preflight
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    # R116: explicit timeout — graph-ui's npm install can take 60-90s and
    # jsdom test setup adds overhead. 15 min is generous but bounded.
    timeout-minutes: 15
    defaults:
      run:
        working-directory: graph-ui
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22.12.0'
          cache: 'npm'
          cache-dependency-path: graph-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npx vitest run

  # ── Package: autonomous pack + install + indexed Graph UI smoke ─
  package-smoke:
    # Keep this exact display name in sync with the protect-main required check.
    name: npm pack + install + CLI smoke
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22.12.0"
          cache: npm
          cache-dependency-path: v2/package-lock.json

      - name: npm ci (v2 only)
        working-directory: v2
        run: npm ci

      - name: npm pack (triggers prepack autonomously)
        working-directory: v2
        run: |
          PACK_DIR="$RUNNER_TEMP/cbm-pack"
          mkdir -p "$PACK_DIR"
          npm pack --pack-destination "$PACK_DIR"
          TARBALLS=()
          while IFS= read -r f; do
            TARBALLS+=("$f")
          done < <(find "$PACK_DIR" -maxdepth 1 -type f -name '*.tgz' -print)
          if [ "${#TARBALLS[@]}" -ne 1 ]; then
            echo "ERROR: Expected exactly 1 tarball, found ${#TARBALLS[@]}" >&2
            exit 1
          fi
          TARBALL="${TARBALLS[0]}"
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Inspect tarball contents
        run: |
          echo "=== Tarball contents ==="
          tar -tf "${{ env.TARBALL }}" | sort
          CONTENTS=$(tar -tf "${{ env.TARBALL }}")
          for required in \
            "package/package.json" \
            "package/LICENSE" \
            "package/README.md" \
            "package/CHANGELOG.md" \
            "package/dist/cli/index.js" \
            "package/dist/ui/index.html"; do
            if echo "$CONTENTS" | grep -Fqx "$required"; then
              echo "  ok: $required"
            else
              echo "  MISSING: $required"
              exit 1
            fi
          done
          for forbidden in \
            "package/src/" \
            "package/tests/" \
            "package/node_modules/" \
            "package/.git"; do
            if echo "$CONTENTS" | grep -Fq "$forbidden"; then
              echo "  FORBIDDEN: $forbidden"
              exit 1
            fi
          done

      - name: Install tarball in temp directory
        run: |
          INSTALL_DIR="$RUNNER_TEMP/cbm-install"
          mkdir -p "$INSTALL_DIR"
          npm install --prefix "$INSTALL_DIR" "${{ env.TARBALL }}"
          echo "CBM_INSTALL_DIR=$INSTALL_DIR" >> "$GITHUB_ENV"

      - name: Configure Playwright browser cache
        run: echo "PLAYWRIGHT_BROWSERS_PATH=$RUNNER_TEMP/ms-playwright" >> "$GITHUB_ENV"

      - name: Install pinned Chromium for packaged Graph UI smoke
        working-directory: v2
        run: npx playwright-core install --with-deps chromium

      - name: CLI smoke test from arbitrary cwd
        working-directory: ${{ runner.temp }}
        run: |
          "$CBM_INSTALL_DIR/node_modules/.bin/cbm-v2" --version
          "$CBM_INSTALL_DIR/node_modules/.bin/cbm-v2" --help

      - name: Embedded packaged Graph UI data contract smoke
        working-directory: ${{ runner.temp }}
        shell: bash
        run: |
          set -euo pipefail

          PROJECT="package-smoke"
          FIXTURE_ROOT="$RUNNER_TEMP/cbm-package-smoke-fixture"
          CACHE_ROOT="$RUNNER_TEMP/cbm-package-smoke-cache"
          CBM_BIN="$CBM_INSTALL_DIR/node_modules/.bin/cbm-v2"
          UI_LOG="$RUNNER_TEMP/cbm-packed-ui.log"
          BASE_URL="http://127.0.0.1:19749"
          UI_PID=""

          cleanup() {
            status=$?
            trap - EXIT INT TERM
            if [ -n "$UI_PID" ]; then
              kill "$UI_PID" 2>/dev/null || true
              for _ in $(seq 1 20); do
                if ! kill -0 "$UI_PID" 2>/dev/null; then
                  break
                fi
                sleep 0.1
              done
              if kill -0 "$UI_PID" 2>/dev/null; then
                kill -KILL "$UI_PID" 2>/dev/null || true
              fi
              wait "$UI_PID" 2>/dev/null || true
            fi
            if [ "$status" -ne 0 ] && [ -f "$UI_LOG" ]; then
              echo "=== Packaged Graph UI log ===" >&2
              cat "$UI_LOG" >&2
            fi
            exit "$status"
          }
          trap cleanup EXIT
          trap 'exit 130' INT
          trap 'exit 143' TERM

          mkdir -p "$FIXTURE_ROOT/src" "$CACHE_ROOT"
          cat > "$FIXTURE_ROOT/src/package-smoke.ts" <<'TS'
          export function packagedGraphTarget(value: number): number {
            return value * 2;
          }

          export function packagedGraphCaller(): number {
            return packagedGraphTarget(21);
          }
          TS

          export XDG_CACHE_HOME="$CACHE_ROOT"
          "$CBM_BIN" index \
            --project "$PROJECT" \
            --root "$FIXTURE_ROOT" \
            --workers 0

          "$CBM_BIN" ui --project "$PROJECT" --port 19749 >"$UI_LOG" 2>&1 &
          UI_PID=$!

          READY=0
          for _ in $(seq 1 40); do
            if ! kill -0 "$UI_PID" 2>/dev/null; then
              break
            fi
            if curl --fail --silent "$BASE_URL/" >/dev/null; then
              READY=1
              break
            fi
            sleep 0.25
          done
          if [ "$READY" -ne 1 ]; then
            cat "$UI_LOG" >&2
            exit 1
          fi

          export BASE_URL PROJECT
          node --input-type=module <<'NODE'
          const baseUrl = process.env.BASE_URL;
          const project = process.env.PROJECT;

          function invariant(condition, message) {
            if (!condition) throw new Error(message);
          }

          async function read(path, kind = 'json') {
            const response = await fetch(`${baseUrl}${path}`);
            const body = await response.text();
            invariant(response.ok, `${path} returned ${response.status}: ${body}`);
            if (kind === 'text') return body;
            try {
              return JSON.parse(body);
            } catch (error) {
              throw new Error(`${path} returned invalid JSON: ${error.message}`);
            }
          }

          const html = await read('/', 'text');
          invariant(html.includes('id="root"'), 'Packaged UI HTML is missing the React root');
          const assetPaths = [...html.matchAll(/(?:src|href)=["'](\/assets\/[^"']+)["']/g)]
            .map((match) => match[1]);
          invariant(assetPaths.length >= 2, 'Packaged UI HTML did not reference JS and CSS assets');
          for (const assetPath of assetPaths) {
            const assetResponse = await fetch(`${baseUrl}${assetPath}`);
            const assetBytes = await assetResponse.arrayBuffer();
            const contentType = assetResponse.headers.get('content-type') ?? '';
            invariant(assetResponse.ok, `${assetPath} returned ${assetResponse.status}`);
            invariant(assetBytes.byteLength > 0, `${assetPath} was empty`);
            if (assetPath.endsWith('.js')) {
              invariant(contentType.includes('javascript'), `${assetPath} has content-type ${contentType}`);
            } else if (assetPath.endsWith('.css')) {
              invariant(contentType.includes('text/css'), `${assetPath} has content-type ${contentType}`);
            }
          }

          const bootstrap = await read('/api/bootstrap');
          invariant(
            typeof bootstrap.csrf_token === 'string' && bootstrap.csrf_token.length >= 32,
            'Bootstrap did not return a valid CSRF token',
          );

          const layout = await read(`/api/layout?project=${encodeURIComponent(project)}&max_nodes=100`);
          invariant(layout.contract_version === 1, 'Layout contract version is not 1');
          invariant(
            /^graph-reader-v1:[A-Za-z0-9_-]{22}$/.test(layout.graph_revision),
            'Layout did not expose a valid graph revision',
          );
          const catalog = layout.layout?.domain_catalog;
          invariant(catalog?.exact === true, 'Layout domain_catalog is not exact');
          invariant(catalog.counts_scope === 'all_nodes', 'Domain catalog does not cover all nodes');
          invariant(Array.isArray(catalog.domains) && catalog.domains.length > 0, 'Domain catalog is empty');
          invariant(
            catalog.domains.reduce((sum, domain) => sum + domain.node_count, 0) === layout.total_nodes,
            'Exact domain counts do not add up to layout.total_nodes',
          );

          const search = await read(
            `/api/node-search?project=${encodeURIComponent(project)}&q=packagedGraphCaller&limit=10`,
          );
          invariant(search.contract_version === 1, 'Node search contract version is not 1');
          invariant(search.exact === true, 'Node search is not exact');
          invariant(
            /^graph-reader-v1:[A-Za-z0-9_-]{22}$/.test(search.graph_revision),
            'Node search did not expose a valid graph revision',
          );
          invariant(
            search.graph_revision === layout.graph_revision,
            'Layout and search were not read from the same graph revision',
          );
          const fixtureNode = search.nodes?.find((node) => node.name === 'packagedGraphCaller');
          invariant(Number.isSafeInteger(fixtureNode?.id), 'Indexed fixture symbol was not found');

          const neighborhood = await read(
            `/api/neighborhood?project=${encodeURIComponent(project)}&node_id=${fixtureNode.id}&limit=10`,
          );
          invariant(neighborhood.contract_version === 1, 'Neighborhood contract version is not 1');
          invariant(neighborhood.exact === true, 'Neighborhood is not exact');
          invariant(
            neighborhood.graph_revision === search.graph_revision,
            'Search and neighborhood were not read from the same graph revision',
          );
          invariant(neighborhood.anchor?.id === fixtureNode.id, 'Neighborhood anchor does not match search');
          invariant(neighborhood.anchor.total_unique_edges > 0, 'Fixture symbol has no indexed neighborhood');
          invariant(neighborhood.page?.returned > 0, 'Neighborhood returned no fixture edges');
          invariant(
            neighborhood.edges?.every(
              (edge) => edge.source === fixtureNode.id || edge.target === fixtureNode.id,
            ),
            'Neighborhood returned an edge unrelated to its anchor',
          );

          const scopeKey = catalog.domains[0].key;
          const scope = await read(
            `/api/scope?project=${encodeURIComponent(project)}&kind=domain&key=${encodeURIComponent(scopeKey)}&limit=10`,
          );
          invariant(scope.contract_version === 1, 'Scope contract version is not 1');
          invariant(scope.exact === true, 'Scope is not exact');
          invariant(
            scope.graph_revision === neighborhood.graph_revision,
            'Scope and neighborhood were not read from the same graph revision',
          );
          invariant(scope.scope?.kind === 'domain' && scope.scope?.key === scopeKey, 'Scope identity drifted');
          invariant(scope.scope.total_nodes === catalog.domains[0].node_count, 'Scope total disagrees with catalog');
          invariant(scope.page?.returned_nodes === scope.nodes?.length, 'Scope node page is inconsistent');
          invariant(scope.page?.returned_edges === scope.edges?.length, 'Scope edge page is inconsistent');
          invariant(
            scope.nodes?.every((node) => Number.isSafeInteger(node.id) && Number.isFinite(node.x) && Number.isFinite(node.y)),
            'Scope returned invalid positioned nodes',
          );

          console.log(
            `Packaged Graph UI verified: ${layout.total_nodes} nodes, fixture node ${fixtureNode.id}, `
              + `${neighborhood.page.returned} neighborhood edge(s), ${scope.page.returned_nodes} scope node(s).`,
          );
          NODE

          "$GITHUB_WORKSPACE/v2/node_modules/.bin/tsx" \
            "$GITHUB_WORKSPACE/v2/scripts/graph-ui-browser-smoke.ts" \
            --base-url "$BASE_URL" \
            --project "$PROJECT"

  # ── Docker: image + CLI + non-root smoke ───────────────────────
  docker-smoke:
    name: Docker build + CLI + non-root smoke
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Build Docker image (no cache)
        run: docker build --no-cache -t cbm-v2:test .

      - name: CLI version
        run: docker run --rm cbm-v2:test --version

      - name: CLI help
        run: docker run --rm cbm-v2:test --help

      - name: Non-root user check
        run: |
          CONTAINER_UID="$(docker run --rm --entrypoint sh cbm-v2:test -c 'id -u')"
          echo "Container runs as UID: $CONTAINER_UID"
          test "$CONTAINER_UID" = "1000"

      - name: Cache directory writable
        run: |
          docker run --rm --entrypoint sh cbm-v2:test -c 'mkdir -p /home/node/.cache/codebase-memory-mcp && touch /home/node/.cache/codebase-memory-mcp/test && echo "Cache writable"'

      - name: UI assets present
        run: |
          docker run --rm --entrypoint sh cbm-v2:test -c 'test -f /app/dist/ui/index.html && echo "UI index.html present"'

      - name: UI HTTP smoke inside runtime image
        shell: bash
        run: |
          NAME="cbm-v2-ui-smoke-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          cleanup() {
            docker rm -f "$NAME" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          docker run --rm -d --name "$NAME" cbm-v2:test \
            ui --project docker-smoke --port 9749 >/dev/null

          READY=0
          for _ in $(seq 1 40); do
            if docker exec "$NAME" node -e \
              "fetch('http://127.0.0.1:9749/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"; then
              READY=1
              break
            fi
            sleep 0.25
          done
          if [ "$READY" -ne 1 ]; then
            docker logs "$NAME" >&2
            exit 1
          fi
          docker exec "$NAME" node -e \
            "Promise.all([fetch('http://127.0.0.1:9749/').then(r=>r.text()),fetch('http://127.0.0.1:9749/api/bootstrap').then(r=>r.json())]).then(([html,b])=>{if(!html.includes('id=\"root\"')||typeof b.csrf_token!=='string'||b.csrf_token.length<32)process.exit(1)}).catch(()=>process.exit(1))"

# R112: removed quota-report job from this workflow.
# Previously, quota-report had `if: github.event_name == 'schedule'` which
# caused it to be SKIPPED on every push/PR. GitHub Actions reports skipped
# jobs as "1 error" in annotations, making the pipeline look failed even
# when backend/frontend passed.
# Fix: quota-report now lives in its own schedule-only workflow file
# (.github/workflows/quota-report.yml). This way, push/PR pipelines only
# contain the five validation jobs — no schedule-only skipped job and no
# false error annotations.

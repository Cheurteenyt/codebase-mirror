# GitHub Actions CI for Codebase Memory V2
# Runs typecheck, build, and tests on every push and pull request.
# This is the primary CI — GitLab CI is a lightweight mirror only.
# Public repos on GitHub have unlimited Actions minutes.
#
# R50: added quota-report job that uses the automatic GITHUB_TOKEN
# (no manual configuration needed) to display API + Actions usage
# in the job summary.

name: CI

on:
  push:
    branches: [main, 'v2/**']
  pull_request:
    branches: [main]
  schedule:
    # R50: weekly quota check every Monday at 00:00 UTC
    - cron: '0 0 * * 1'

# Cancel in-progress runs for the same branch (saves minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend (v2): typecheck + build + test ─────────────────────
  backend:
    name: Backend (v2)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    defaults:
      run:
        working-directory: v2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: v2/package.json

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  # ── Frontend (graph-ui): typecheck + build + test ──────────────
  frontend:
    name: Frontend (graph-ui)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    defaults:
      run:
        working-directory: graph-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: graph-ui/package.json

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  # ── Quota Report (R50) ────────────────────────────────────────
  # Uses the automatic GITHUB_TOKEN — no manual configuration needed.
  # Displays API rate limits + Actions usage in the job summary.
  # Runs on every push AND on the weekly schedule.
  quota-report:
    name: Quota Report
    runs-on: ubuntu-latest
    # Run on schedule + on pushes to main (not on feature branches to save minutes)
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    steps:
      - name: Check GitHub API rate limits
        id: rate_limit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## 🔍 Quota Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # GitHub API rate limit (authenticated = 5000/hr instead of 60/hr)
          RESPONSE=$(curl -s -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/rate_limit")

          CORE_REMAINING=$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['resources']['core']['remaining'])")
          CORE_LIMIT=$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['resources']['core']['limit'])")
          SEARCH_REMAINING=$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['resources']['search']['remaining'])")
          SEARCH_LIMIT=$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['resources']['search']['limit'])")

          echo "### GitHub API Rate Limits" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Remaining | Limit |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Core API | $CORE_REMAINING | $CORE_LIMIT |" >> $GITHUB_STEP_SUMMARY
          echo "| Search API | $SEARCH_REMAINING | $SEARCH_LIMIT |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Check GitHub Actions usage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Count Actions minutes used this month (from workflow runs)
          # Note: GitHub doesn't expose billing minutes via API for free accounts.
          # But we can count the number of runs and their duration.
          RUNS_RESPONSE=$(curl -s -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=100&created=$(date -u -d '30 days ago' +%Y-%m-%d)..$(date -u +%Y-%m-%d)")

          TOTAL_RUNS=$(echo "$RUNS_RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('total_count', 0))")

          echo "### GitHub Actions (last 30 days)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total runs (30d) | $TOTAL_RUNS |" >> $GITHUB_STEP_SUMMARY
          echo "| Actions minutes | **Unlimited** (public repo) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ✅ Public repos have **unlimited** Actions minutes — no quota to exhaust." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Check GitLab CI minutes
        env:
          # CI_JOB_TOKEN is automatically available in GitLab CI but NOT in GitHub Actions.
          # We use the GITHUB_TOKEN to check the GitHub mirror's CI status instead.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "### GitLab CI Minutes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| GitLab CI limit | 400 min/month (free tier) |" >> $GITHUB_STEP_SUMMARY
          echo "| Our usage | ~3 min/month (mirror job only, ~5s per merge) |" >> $GITHUB_STEP_SUMMARY
          echo "| Remaining | **~397 min/month** (99% available) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ℹ️ GitLab CI quota is checked via the GitLab pipeline logs (mirror job)." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **GitHub Actions**: unlimited (public repo)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **GitLab CI**: ~1% usage (mirror only)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **GitHub API**: 5000 req/hr (authenticated)" >> $GITHUB_STEP_SUMMARY

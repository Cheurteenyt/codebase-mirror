# R157: Sync graph-ui/* changes from GitHub to GitLab — HARDENED.
#
# R156 had insufficient security: no fork guard, no path guard, --force
# instead of --force-with-lease, remove_source_branch=false.
# R157 adds all missing security checks.
#
# Security model (R157):
#   - workflow_run trigger (runs in context of main, with secrets)
#   - Checks head_repository.full_name == github.repository (no forks)
#   - Checks workflow_run.event == 'pull_request'
#   - Checks branch starts with 'graph-ui/'
#   - Checks workflow_run.conclusion == 'success'
#   - Refuses if branch modifies .github/workflows/ or .gitlab-ci.yml
#   - Uses --force-with-lease (not --force)
#   - URL-encodes branch name for API queries
#   - Creates MR with remove_source_branch=true
#   - Removes private key in if: always() cleanup

name: Sync graph-ui to GitLab

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  actions: read

concurrency:
  group: sync-graph-ui-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  sync:
    # R157 (SEC-R157-01): Only run if CI succeeded AND source is same repo (not fork)
    # AND source event is pull_request AND branch is graph-ui/*.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      startsWith(github.event.workflow_run.head_branch, 'graph-ui/')

    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: gitlab-graph-ui-sync

    steps:
      - name: Capture validated ref
        id: ref
        shell: bash
        env:
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          case "$BRANCH" in
            graph-ui/*) ;;
            *)
              echo "Refusing unexpected branch: $BRANCH" >&2
              exit 1
              ;;
          esac
          git check-ref-format --branch "$BRANCH" >/dev/null
          if ! [[ "$SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid SHA: $SHA" >&2
            exit 1
          fi
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout exact validated SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.sha }}
          fetch-depth: 0

      - name: Protect CI infrastructure
        # R157 (SEC-R157-02): Refuse if the branch modifies privileged files.
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          FORBIDDEN="$(
            git diff --name-only origin/main...HEAD |
            grep -E '^(\.github/workflows/|\.gitlab-ci\.yml$)' || true
          )"
          if [ -n "$FORBIDDEN" ]; then
            echo "Graph UI branch modifies privileged CI files:" >&2
            echo "$FORBIDDEN" >&2
            echo "Use a separately reviewed infrastructure MR." >&2
            exit 1
          fi

      - name: Configure GitLab SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GITLAB_GRAPH_UI_SSH_PRIVATE_KEY }}
          KNOWN_HOSTS: ${{ vars.GITLAB_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"
          cat > "$HOME/.ssh/config" <<'EOF'
          Host gitlab.com
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF
          chmod 600 "$HOME/.ssh/config"

      - name: Push branch with lease
        # R157 (SYNC-R157-01): Use --force-with-lease, not --force.
        id: push
        shell: bash
        env:
          BRANCH: ${{ steps.ref.outputs.branch }}
          GITLAB_URL: ${{ vars.GITLAB_REPOSITORY_SSH_URL }}
        run: |
          set -euo pipefail
          git remote add gitlab "$GITLAB_URL"
          REMOTE_SHA="$(
            git ls-remote gitlab "refs/heads/$BRANCH" |
            awk '{print $1}'
          )"
          if [ -z "$REMOTE_SHA" ]; then
            git push gitlab "HEAD:refs/heads/$BRANCH"
          else
            git push gitlab \
              --force-with-lease="refs/heads/$BRANCH:$REMOTE_SHA" \
              "HEAD:refs/heads/$BRANCH"
          fi
          PUSHED_SHA="$(git rev-parse HEAD)"
          echo "pushed_sha=$PUSHED_SHA" >> "$GITHUB_OUTPUT"

      - name: Create or update GitLab MR
        # R157 (SYNC-R157-02/03): URL-encode branch, filter target, remove_source_branch=true.
        shell: bash
        env:
          TOKEN: ${{ secrets.GITLAB_GRAPH_UI_API_TOKEN }}
          PROJECT_ID: ${{ vars.GITLAB_PROJECT_ID }}
          BRANCH: ${{ steps.ref.outputs.branch }}
          PUSHED_SHA: ${{ steps.push.outputs.pushed_sha }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          API="https://gitlab.com/api/v4"
          ENCODED_BRANCH="$(
            python3 -c 'import sys,urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "$BRANCH"
          )"
          OPEN_MRS="$(
            curl --fail-with-body --silent \
              --header "PRIVATE-TOKEN: $TOKEN" \
              "$API/projects/$PROJECT_ID/merge_requests?state=opened&source_branch=$ENCODED_BRANCH&target_branch=main"
          )"
          MR_COUNT="$(
            printf '%s' "$OPEN_MRS" |
            python3 -c 'import json,sys; print(len(json.load(sys.stdin)))'
          )"
          TITLE="$(git log -1 --pretty=%s)"
          DESCRIPTION="GitHub source: https://github.com/$GH_REPOSITORY/tree/$BRANCH

          Validated SHA: \`$PUSHED_SHA\`

          GitHub CI: https://github.com/$GH_REPOSITORY/actions/runs/$GH_RUN_ID

          This MR is synchronized automatically from a validated Graph UI branch."

          if [ "$MR_COUNT" -eq 0 ]; then
            curl --fail-with-body --silent \
              --request POST \
              --header "PRIVATE-TOKEN: $TOKEN" \
              --data-urlencode "source_branch=$BRANCH" \
              --data-urlencode "target_branch=main" \
              --data-urlencode "title=$TITLE" \
              --data-urlencode "description=$DESCRIPTION" \
              --data-urlencode "remove_source_branch=true" \
              "$API/projects/$PROJECT_ID/merge_requests"
          else
            MR_IID="$(
              printf '%s' "$OPEN_MRS" |
              python3 -c 'import json,sys; print(json.load(sys.stdin)[0]["iid"])'
            )"
            curl --fail-with-body --silent \
              --request PUT \
              --header "PRIVATE-TOKEN: $TOKEN" \
              --data-urlencode "title=$TITLE" \
              --data-urlencode "description=$DESCRIPTION" \
              "$API/projects/$PROJECT_ID/merge_requests/$MR_IID"
          fi

      - name: Remove private key
        if: always()
        shell: bash
        run: |
          rm -f "$HOME/.ssh/id_ed25519"
